app:
  api:
    anthropic-api-key: your-api-key-here
  db:
    # Local development (default — H2 file mode, persists across restarts)
    url: jdbc:h2:file:./data/awgdas-local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    # Production (PostgreSQL) — replace the above when deploying:
    # url: jdbc:postgresql://localhost:5432/awgdas
    # username: your-db-username
    # password: your-db-password
